name: Release

# Cuts a release when a `vX.Y.Z` tag is pushed. The CI workflow already
# builds the wheel, smoke-tests it in a clean venv, and asserts the www/
# bundle is embedded on every push (`package` job), so "CI green on
# main" means "this tag will ship." No manual dry-run, no dispatch dance:
# tag, push, done.
#
# Steps:
#   1. Build the www/ bundle with pnpm + vite. Vite's build outDir points
#      at `api/src/transport_matters/www/` so the wheel picks it up through
#      hatch's `artifacts = ["src/transport_matters/www/**"]` glob.
#   2. Run `uv build` to produce the wheel and sdist. hatch-vcs reads the
#      git tag, so the version string in the wheel filename matches the tag.
#   3. Smoke the wheel in a clean venv: install, run `transport-matters --version`,
#      run `transport-matters doctor --help`, and assert the embedded www/ ships.
#   4. Publish to PyPI via trusted publishing (OIDC), no tokens.
#   5. Create a GitHub Release and attach the wheel, sdist, and install.sh.
#
# PyPI trusted publishing must be configured at:
#   https://pypi.org/manage/account/publishing/
# with project=transport-matters, owner=srobinson, repo=transport-matters,
# workflow=release.yml, environment=pypi.

on:
  push:
    tags:
      - "v*"
  # Emergency re-run button. Pushing a tag is the normal path.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------- #
  # 1. Build wheel + sdist with the embedded www/ bundle                  #
  # --------------------------------------------------------------------- #
  build:
    name: build · wheel + sdist
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout (full history for hatch-vcs)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: www/package.json

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: www/pnpm-lock.yaml

      - name: Install www/ dependencies
        working-directory: www
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Gate on frontend checks
        working-directory: www
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test

      - name: Build www/ bundle into api/src/transport_matters/www
        working-directory: www
        run: pnpm build

      - name: Verify www/ landed inside the Python package
        run: |
          if [ ! -f api/src/transport_matters/www/index.html ]; then
            echo "::error::vite build did not produce api/src/transport_matters/www/index.html"
            exit 1
          fi
          ls -lh api/src/transport_matters/www/

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync backend deps (for test gate)
        working-directory: api
        run: uv sync --locked --dev

      - name: Gate on backend checks
        working-directory: api
        run: |
          uv run ruff check src/
          uv run ruff format --check src/
          uv run mypy src/
          uv run pytest --cov=transport_matters --cov-report=term

      - name: Build wheel + sdist
        working-directory: api
        run: uv build

      - name: Resolve built version
        id: version
        working-directory: api
        run: |
          wheel=$(ls dist/transport_matters-*.whl | head -1)
          version=$(basename "$wheel" | sed -E 's/^transport_matters-([^-]+)-.*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Built transport-matters $version"

      - name: Verify tag matches built version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
          BUILT: ${{ steps.version.outputs.version }}
        run: |
          expected="${TAG#v}"
          if [ "$BUILT" != "$expected" ]; then
            echo "::error::tag $TAG implies version $expected but hatch built $BUILT"
            echo "This usually means the tag is not annotated or the checkout is shallow."
            exit 1
          fi

      - name: Smoke-test the wheel in a clean venv
        working-directory: api
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/transport_matters-*.whl
          /tmp/smoke/bin/transport-matters --version
          /tmp/smoke/bin/transport-matters version
          /tmp/smoke/bin/transport-matters paths --json
          /tmp/smoke/bin/transport-matters --help > /dev/null
          /tmp/smoke/bin/transport-matters claude --help > /dev/null
          /tmp/smoke/bin/transport-matters doctor --help > /dev/null

      - name: Confirm embedded www/ inside the wheel
        working-directory: api
        run: |
          wheel=$(ls dist/transport_matters-*.whl | head -1)
          if ! python -m zipfile -l "$wheel" | grep -q 'transport_matters/www/index.html'; then
            echo "::error::wheel $wheel does not contain transport_matters/www/index.html"
            python -m zipfile -l "$wheel"
            exit 1
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: python-dist
          path: api/dist/*
          if-no-files-found: error
          retention-days: 7

  # --------------------------------------------------------------------- #
  # 2. Publish to PyPI via trusted publishing (OIDC, no tokens)           #
  # --------------------------------------------------------------------- #
  publish-pypi:
    name: publish · PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish when we have a real tag. workflow_dispatch on a branch
    # builds + smokes the wheel but stops short of publishing.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/transport-matters/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v7
        with:
          name: python-dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true

  # --------------------------------------------------------------------- #
  # 3. Create GitHub Release + attach artifacts                           #
  # --------------------------------------------------------------------- #
  github-release:
    name: release · GitHub
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download dist
        uses: actions/download-artifact@v7
        with:
          name: python-dist
          path: dist

      - name: Generate checksums
        working-directory: dist
        run: sha256sum transport_matters-* > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          # Include install.sh in the release so a specific version is
          # always reachable at the tag URL.
          gh release create "$TAG" \
            --title "Transport Matters $VERSION" \
            --generate-notes \
            dist/transport_matters-*.whl \
            dist/transport_matters-*.tar.gz \
            dist/SHA256SUMS \
            scripts/install.sh
