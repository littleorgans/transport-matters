name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: backend · lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff check
        run: uv run ruff check src/

      - name: Ruff format check
        run: uv run ruff format --check src/

      - name: Type check
        run: uv run mypy src/

  backend-test:
    name: backend · test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: tm
          POSTGRES_PASSWORD: tm
          POSTGRES_DB: transport_matters
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tm -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # No python-version pin: uv reads api/.python-version (the single
      # source of truth for the interpreter) and fetches it. The floor is
      # 3.14 via requires-python; testing one version matches the support
      # surface.
      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run tests with coverage
        env:
          TRANSPORT_MATTERS_TEST_DATABASE_URL: postgresql://tm:tm@localhost:5432/postgres
        run: |
          uv run python -m pytest src/transport_matters/session/test_migrate.py -q
          uv run pytest --cov=transport_matters --cov-report=term

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint (biome)
        run: pnpm --filter @tm/shell lint

      - name: Type check
        run: |
          pnpm --filter @tm/shell typecheck
          pnpm --filter @tm/core typecheck
          pnpm --filter @tm/inspector typecheck
          pnpm --filter @tm/canvas typecheck

      - name: Unit tests
        run: pnpm --filter @tm/shell test

      - name: Build both product bundles
        run: |
          pnpm --filter @tm/inspector build
          pnpm --filter @tm/canvas build

      # Hand the built bundles off to the `package` job so it can embed
      # them in the wheel without re-running pnpm.
      - name: Upload www (inspector) bundle
        uses: actions/upload-artifact@v6
        with:
          name: www-bundle
          path: api/src/transport_matters/www/
          if-no-files-found: error
          retention-days: 1

      - name: Upload canvas bundle
        uses: actions/upload-artifact@v6
        with:
          name: canvas-bundle
          path: api/src/transport_matters/canvas/
          if-no-files-found: error
          retention-days: 1

  # ------------------------------------------------------------------- #
  # Unit tests mount components in jsdom with fresh storage, so a route  #
  # that crashes at mount in a real browser ships green: the /canvas-lab #
  # route broke on a live roadtest while lint, typecheck, vitest, and    #
  # the vite build all passed. This job runs the behavioral Playwright   #
  # e2e suite (tests/e2e) against a real dev server in chromium, which   #
  # mounts every route the specs cover. Chromium only: CI guards route   #
  # behavior, the local three-browser run guards engine differences.     #
  # ------------------------------------------------------------------- #
  frontend-e2e:
    name: frontend e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Playwright chromium
        run: pnpm --filter @tm/shell exec playwright install --with-deps chromium

      - name: Behavioral e2e (chromium)
        run: pnpm --filter @tm/shell exec playwright test --project=chromium

      # The production topology in a real browser: each project builds its
      # product bundle and serves it with `vite preview` at its production
      # base (inspector at /, canvas at /canvas), catching per-entry CSS,
      # host chrome, and theme bootstrap regressions the dev shell hides.
      - name: Bundle matrix (inspector at /, canvas at /canvas)
        run: pnpm --filter @tm/shell exec playwright test --project=matrix-inspector --project=matrix-canvas

  # ------------------------------------------------------------------- #
  # Desktop never ran in CI, so a broken Electron preload shipped green: #
  # typecheck + mocked unit tests pass while the real app fails to load. #
  # This job builds the desktop package and runs the packaged smoke under #
  # xvfb, which loads the real sandboxed preload and fails closed if it   #
  # does not execute. Pinned to ubuntu-22.04 for stable Electron lib     #
  # package names (libasound2, libgtk-3-0).                              #
  # ------------------------------------------------------------------- #
  desktop:
    name: desktop
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Type check
        run: pnpm --filter transport-matters-desktop typecheck

      - name: Unit tests
        run: pnpm --filter transport-matters-desktop test

      - name: Build (emits + asserts the CommonJS preload)
        run: pnpm --filter transport-matters-desktop build

      # Electron needs a virtual display and GUI libraries to launch
      # headlessly. The packaged smoke loads the real sandboxed preload, so
      # this is the coverage that would have caught the ESM-preload failure.
      - name: Install Electron runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libgtk-3-0 \
            libgbm1 \
            libasound2

      - name: Package smoke under xvfb (proves the preload executes)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x900x24" pnpm --filter transport-matters-desktop package:smoke

  # ------------------------------------------------------------------- #
  # Prove the release chain on every push: build the wheel, install it #
  # in a clean venv, run the CLI, assert both bundles are embedded.    #
  # Without this job there is a gap between "CI green" and "tag push   #
  # will release cleanly". With it, `git push --tags` is mechanical.   #
  # ------------------------------------------------------------------- #
  package:
    name: backend · package
    needs: [backend-lint, backend-test, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for hatch-vcs)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download www (inspector) bundle
        uses: actions/download-artifact@v7
        with:
          name: www-bundle
          path: /tmp/www-bundle

      - name: Download canvas bundle
        uses: actions/download-artifact@v7
        with:
          name: canvas-bundle
          path: /tmp/canvas-bundle

      - name: Stage frontend bundles into the package
        run: |
          for bundle in www canvas; do
            mkdir -p "api/src/transport_matters/$bundle"
            # upload-artifact@v4 preserves the LCA of the uploaded paths.
            # Handle both possible layouts: flat (index.html at artifact
            # root) or nested ($bundle/index.html at artifact root). Either
            # gives us the same result after staging.
            if [ -f "/tmp/$bundle-bundle/index.html" ]; then
              cp -r "/tmp/$bundle-bundle/." "api/src/transport_matters/$bundle/"
            elif [ -f "/tmp/$bundle-bundle/$bundle/index.html" ]; then
              cp -r "/tmp/$bundle-bundle/$bundle/." "api/src/transport_matters/$bundle/"
            else
              echo "::error::$bundle bundle artifact has unexpected structure"
              find "/tmp/$bundle-bundle" -type f
              exit 1
            fi
            if [ ! -f "api/src/transport_matters/$bundle/index.html" ]; then
              echo "::error::staging did not produce api/src/transport_matters/$bundle/index.html"
              exit 1
            fi
            ls -lh "api/src/transport_matters/$bundle/"
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # The two-directory serving topology against the REAL staged bundles:
      # /canvas and /canvas-lab serve the canvas SPA, / catch-all serves the
      # inspector, missing assets 404 instead of falling back to the wrong
      # SPA's index.html. The backend-test job skips these (no bundles).
      - name: Static serving integration (two real bundles)
        working-directory: api
        run: |
          uv sync --locked --dev
          uv run pytest tests/integration/test_static_bundles.py -q

      - name: Build wheel + sdist
        working-directory: api
        run: uv build

      - name: Smoke-test the wheel in a clean venv
        working-directory: api
        run: |
          uv venv --python "$(cat .python-version)" --seed /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/transport_matters-*.whl
          /tmp/smoke/bin/transport-matters --version
          /tmp/smoke/bin/transport-matters version
          /tmp/smoke/bin/transport-matters paths --json
          /tmp/smoke/bin/transport-matters --help > /dev/null
          /tmp/smoke/bin/transport-matters claude --help > /dev/null
          /tmp/smoke/bin/transport-matters doctor --help > /dev/null

      - name: Confirm embedded bundles inside the wheel
        working-directory: api
        run: |
          wheel=$(ls dist/transport_matters-*.whl | head -1)
          for bundle in www canvas; do
            if ! python -m zipfile -l "$wheel" | grep -q "transport_matters/$bundle/index.html"; then
              echo "::error::wheel $wheel does not contain transport_matters/$bundle/index.html"
              python -m zipfile -l "$wheel"
              exit 1
            fi
          done
