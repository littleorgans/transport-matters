services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: tm
      POSTGRES_PASSWORD: tm
      POSTGRES_DB: transport_matters
    ports:
      - "127.0.0.1:${TRANSPORT_MATTERS_DOCKER_PG_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tm -d transport_matters"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - tm-postgres:/var/lib/postgresql/data

volumes:
  tm-postgres:
